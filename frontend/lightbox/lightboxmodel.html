<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox assessment</title>
    <link rel="stylesheet" href="lightbox.css">
</head>
<body>
    <div class="gallery">
        <img src="/images/slide1.jpg" alt="Product 1" class="product-image">
        <img src="/images/slide2.jpg" alt="Product 2" class="product-image">
        <img src="/images/slide3.jpg" alt="Product 3" class="product-image">
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <button class="prev">Previous</button>
        <img src="" alt="" class="lightbox-image">
        <button class="next">Next</button>
    </div>

    <script src="lightbox.js"></script>
</body>
</html>
